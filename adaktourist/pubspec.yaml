name: adaktourist
description: "Une appli mobile de sites touristiques."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  flutter_secure_storage: ^9.0.0
  provider: ^6.1.0
  go_router: ^13.0.0
  google_maps_flutter: ^2.5.0
  cached_network_image: ^3.3.0
  webview_flutter: ^4.4.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true